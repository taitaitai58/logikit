name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # logikit's core is pure standard library, so it should work on every
        # supported Python with no extra install step.
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests (pure stdlib)
        run: python -m unittest discover -s tests -v

      - name: Smoke-test the examples (generate + connectivity check + simulate)
        run: python -m examples.circuits

      - name: Environment doctor (informational; optional tools are absent on CI)
        run: python -m logikit.doctor || true
